apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-service
  namespace: clahanstore
spec:
  serviceName: payment-service
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Waiting for MongoDB..."; until nc -z mongodb 27017; do sleep 2; done; echo "MongoDB is ready!"']
      containers:
      - name: payment-service
        image: mvnsakash/payment:latest
        ports:
        - containerPort: 3009
        env:
        - name: PORT
          value: '3009'
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: ORDER_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_PAYMENT
        - name: KEYCLOAK_URL
          value: "http://keycloak.default.svc.cluster.local:8080/auth"
        - name: KEYCLOAK_REALM
          value: "ecommerce"
        - name: KEYCLOAK_CLIENT_ID
          value: "payment-service"
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3009
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3009
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
