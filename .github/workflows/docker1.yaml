name: Build, Scan & Push Secure Image

on:
  workflow_run:
    # ⚠️ REPLACE "Snyk Scan" with the EXACT 'name:' found at the top of your snyk.yaml
    workflows: ["Snyk Scan"]
    types:
      - completed
    branches:
      - main
      - muvvaalaakash-ci-pipeline
  # 📥 This section enables manual triggering with parameters
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker Image Tag (e.g., v1.0.5)'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: payment

jobs:
  docker-security-scan:
    # This allows it to run IF manually triggered OR IF the upstream Snyk workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔢 Step 1: Determine Version (Manual Input vs Auto)
      - name: Set Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.docker_tag }}" >> $GITHUB_ENV
            echo "Using manual tag: ${{ github.event.inputs.docker_tag }}"
          else
            # Your existing auto-increment logic
            VERSION_FILE="version.txt"
            if [ ! -f $VERSION_FILE ]; then echo "v1.0.0" > $VERSION_FILE; fi
            CURRENT=$(cat $VERSION_FILE)
            MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
            echo $NEW_VERSION > $VERSION_FILE
            echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "Using auto-generated tag: $NEW_VERSION"
          fi

      # 🐳 Step 2: Build Image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .

      # 🔧 Install Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # 📄 Download HTML template
      - name: Download Trivy Template
        run: |
          mkdir -p trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o trivy-templates/html.tpl

      # 🔍 Step 3: Scan
      - name: Trivy Scan (Fail on CRITICAL)
        continue-on-error: true
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_NAME:${{ env.VERSION }}

      # 📊 Step 4: Generate report
      - name: Generate Trivy Report
        if: success()
        run: |
          trivy image --format template --template "trivy-templates/html.tpl" --output trivy-report.html $IMAGE_NAME:${{ env.VERSION }}

      # 🔐 Step 5: Docker Login
      - name: Login to DockerHub
        if: success()
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # 🚀 Step 6: Push Image
      - name: Push Image
        if: success()
        run: |
          docker tag $IMAGE_NAME:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}

      # 📧 Step 7: Email Report
      - name: Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Docker Scan Report - ${{ env.VERSION }}"
          to: ${{ secrets.MAIL_TO }}
          from: CI Scanner <${{ secrets.MAIL_USERNAME }}>
          body: |
            Repo   : ${{ github.repository }}
            Commit : ${{ github.sha }}
            Tag    : ${{ env.VERSION }}
            Status : ${{ job.status }}
          attachments: trivy-report.html
