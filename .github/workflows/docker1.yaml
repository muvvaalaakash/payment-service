name: Build, Scan & Push Secure Image

on:
  workflow_run:
    workflows: ["Snyk Scan"]   # ⚠️ must match EXACT workflow name
    types:
      - completed
    branches:
      - main
      - muvvaalaakash-ci-pipeline

  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker Image Tag (e.g., v1.0.5)'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: payment

jobs:
  docker-security-scan:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔢 Version Handling (Manual OR Auto)
      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.docker_tag }}"
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Manual trigger → using tag: $VERSION"
          else
            VERSION_FILE="version.txt"

            if [ ! -f $VERSION_FILE ]; then
              echo "v1.0.0" > $VERSION_FILE
            fi

            CURRENT=$(cat $VERSION_FILE)
            MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $CURRENT | cut -d. -f2)
            PATCH=$(echo $CURRENT | cut -d. -f3)

            PATCH=$((PATCH + 1))
            NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

            echo $NEW_VERSION > $VERSION_FILE
            echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

            echo "Auto trigger → using tag: $NEW_VERSION"
          fi

      # 🐳 Build Image
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .

      # 🔧 Install Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      # 📄 Download Trivy Template
      - name: Download Trivy Template
        run: |
          mkdir -p trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
          -o trivy-templates/html.tpl

      # 🔍 Security Scan (FAIL if vulnerabilities found)
      - name: Trivy Scan (Fail on HIGH/CRITICAL)
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_NAME:${{ env.VERSION }}

      # 📊 Generate Report (only if scan passes)
      - name: Generate Trivy Report
        if: success()
        run: |
          trivy image \
            --format template \
            --template "trivy-templates/html.tpl" \
            --output trivy-report.html \
            $IMAGE_NAME:${{ env.VERSION }}

      # 🔐 Docker Login
      - name: Login to DockerHub
        if: success()
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # 🚀 Push Image (version + latest)
      - name: Push Image
        if: success()
        run: |
          docker tag $IMAGE_NAME:${{ env.VERSION }} \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}

          docker tag $IMAGE_NAME:${{ env.VERSION }} \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      # 📧 Email Report (always runs)
      - name: Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Docker Scan Report - ${{ env.VERSION }}"
          to: ${{ secrets.MAIL_TO }}
          from: CI Scanner <${{ secrets.MAIL_USERNAME }}>
          body: |
            Repo   : ${{ github.repository }}
            Commit : ${{ github.sha }}
            Tag    : ${{ env.VERSION }}
            Status : ${{ job.status }}
          attachments: trivy-report.html
